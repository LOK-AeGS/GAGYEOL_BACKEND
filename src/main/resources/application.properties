spring.application.name=GAGYELOL

# DB (Local PostgreSQL + pgvector)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gagyelol}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:gagyelol}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# File upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
file.upload.policy-dir=./uploads/policies
file.upload.form-dir=./uploads/forms
file.upload.evidence-dir=./uploads/evidence

# JWT
jwt.secret=${JWT_SECRET:gagyelol-secret-key-must-be-at-least-256-bits-long-for-hs256}
jwt.expiration=86400000

# OpenAI
openai.api-key=${OPENAI_API_KEY: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}
